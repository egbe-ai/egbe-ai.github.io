<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>
    <meta name="robots" content="noindex">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-K4NHZYTGG6"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-K4NHZYTGG6');
    </script>
    <style>
        :root {
            color-scheme: dark;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 2rem;
            background: #0E1A2B;
            color: #F5E6C8;
            font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        main {
            max-width: 36rem;
            text-align: center;
        }

        h1 {
            margin: 0 0 0.75rem;
            font-size: clamp(2rem, 5vw, 3rem);
            line-height: 1.1;
        }

        p {
            margin: 0 0 1rem;
            color: rgba(245, 230, 200, 0.8);
        }

        a {
            color: #F2C94C;
        }
    </style>
    <script>
        (function () {
            var prefix = "/p/";
            var path = window.location.pathname;

            if (!path.startsWith(prefix)) {
                return;
            }

            var promo = path.slice(prefix.length).replace(/^\/+|\/+$/g, "");
            if (!promo) {
                return;
            }

            var promoValue = promo;
            try {
                promoValue = decodeURIComponent(promo);
            } catch (error) {
                promoValue = promo;
            }

            var target = new URL("https://dashboard.egbe.ai/");
            var params = new URLSearchParams(window.location.search);
            params.set("promo", promoValue);
            target.search = params.toString();
            target.hash = window.location.hash;
            window.location.replace(target.toString());
        }());
    </script>
</head>
<body>
    <main>
        <h1>Page not found</h1>
        <p>If you expected a promo redirect here, check that the link includes a code after <code>/p/</code>.</p>
        <p><a href="/">Return to egbe.ai</a></p>
    </main>
</body>
</html>
